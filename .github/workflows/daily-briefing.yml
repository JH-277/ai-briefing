name: Daily AI Briefing

on:
  schedule:
    # 아침에 여러 번 시도 (GitHub 지연 대비). 하루 1통만 전송.
    - cron: "30 22 * * *"   # 07:30 KST
    - cron: "0 23 * * *"    # 08:00 KST
    - cron: "30 23 * * *"   # 08:30 KST
    - cron: "0 0 * * *"     # 09:00 KST
    - cron: "0 1 * * *"     # 10:00 KST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare Telegram config from secrets
        env:
          BRIEFING_CHANNEL: ${{ secrets.BRIEFING_CHANNEL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/prepare_github_env.py

      - name: Generate and send daily briefing
        env:
          BRIEFING_CHANNEL: ${{ secrets.BRIEFING_CHANNEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/run_scheduled_briefing.py

      - name: Save curriculum state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json
          git diff --staged --quiet || git commit -m "chore: curriculum state after daily briefing"
          git push
